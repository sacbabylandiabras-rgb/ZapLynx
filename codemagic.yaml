workflows:
  ios-expo-release:
    name: ZapLynx Expo - iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store
      vars:
        BUNDLE_ID: "com.zaplynxpay.app"
        APP_NAME: "ZapLynx"
        APPLE_TEAM_ID: "5GF5TZZ9RQ"
      node: 20.11.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Validate required signing variables
        script: |
          set -e
          test -n "$APP_STORE_CONNECT_PRIVATE_KEY" || (echo "ERROR: APP_STORE_CONNECT_PRIVATE_KEY is not set" && exit 1)
          test -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" || (echo "ERROR: APP_STORE_CONNECT_KEY_IDENTIFIER is not set" && exit 1)
          test -n "$APP_STORE_CONNECT_ISSUER_ID" || (echo "ERROR: APP_STORE_CONNECT_ISSUER_ID is not set" && exit 1)
      - name: Install npm dependencies
        script: |
          npm install
          npx expo install expo-notifications
      - name: Set up Codemagic keychain and signing files
        script: |
          set -e
          keychain initialize
          CERTIFICATE_KEY_PATH="/tmp/codemagic_ios_distribution_private_key.pem"
          openssl genrsa -out "$CERTIFICATE_KEY_PATH" 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "@file:$CERTIFICATE_KEY_PATH" \
            --create
          keychain add-certificates
          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -n 1)
          test -n "$PROFILE_PATH" || (echo "ERROR: provisioning profile was not installed" && exit 1)
          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          /usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist
          /usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist
          /usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /tmp/profile.plist
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" /tmp/profile.plist
      - name: Run Expo prebuild
        script: |
          export CI=1
          rm -rf ios
          npx expo prebuild --platform ios --clean
      - name: Set app name and bundle id
        script: |
          set -e
          PROJECT_NAME=$(find ios -maxdepth 1 -name "*.xcodeproj" -exec basename {} .xcodeproj \; | head -n 1)
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" "ios/$PROJECT_NAME/Info.plist" || true
          gem list xcodeproj -i > /dev/null 2>&1 || sudo gem install xcodeproj
          ruby <<'RUBY'
          require 'xcodeproj'
          bundle_id = ENV.fetch('BUNDLE_ID')
          team_id = ENV.fetch('APPLE_TEAM_ID')
          project_path = Dir['ios/*.xcodeproj'].first
          project = Xcodeproj::Project.open(project_path)
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = bundle_id if target.respond_to?(:product_type) && target.product_type == 'com.apple.product-type.application'
              config.build_settings['DEVELOPMENT_TEAM'] = team_id
              config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
            end
          end
          project.save
          RUBY
      - name: Install Firebase GoogleService-Info.plist
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_B64" ]; then
            PROJECT_NAME=$(find ios -maxdepth 1 -name "*.xcodeproj" -exec basename {} .xcodeproj \; | head -n 1)
            echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > "ios/$PROJECT_NAME/GoogleService-Info.plist"
            echo "GoogleService-Info.plist installed"
          else
            echo "GOOGLE_SERVICE_INFO_PLIST_B64 not set; skipping"
          fi
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
      - name: Create ExportOptions
        script: |
          set -e
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF
          cat /tmp/ExportOptions.plist
      - name: Build iOS app (archive + export IPA)
        script: |
          set -e
          mkdir -p build/ios/ipa /tmp/xcodebuild_logs
          WORKSPACE_PATH=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          xcodebuild -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            archive | tee /tmp/xcodebuild_logs/archive.log
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa | tee /tmp/xcodebuild_logs/export.log
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
