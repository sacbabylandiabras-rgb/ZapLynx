workflows:
  ios-expo-release:
    name: ZapLynx Expo - iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store
      vars:
        BUNDLE_ID: "com.zaplynxpay.app"
      node: 20.11.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
          # Garante que expo-notifications esteja instalado (referenciado em app.json plugins)
          npm install expo-notifications --save

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli eas-cli

      - name: Set bundle ID in app.json
        script: |
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          app.expo = app.expo || {};
          app.expo.ios = app.expo.ios || {};
          app.expo.ios.bundleIdentifier = '$BUNDLE_ID';
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          console.log('Bundle ID set to:', app.expo.ios.bundleIdentifier);
          "

      - name: Run Expo prebuild (generates ios/ folder)
        script: |
          export CI=1
          npx expo prebuild --platform ios --clean

      - name: Detect Xcode workspace and scheme
        script: |
          WORKSPACE=$(find ios -maxdepth 2 -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "XCODE_WORKSPACE=$WORKSPACE" >> $CM_ENV
          echo "XCODE_SCHEME=$SCHEME" >> $CM_ENV
          echo "Detected workspace: $WORKSPACE"
          echo "Detected scheme: $SCHEME"

      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install

      - name: Install certificate and profile
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/distribution.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          security create-keychain -p "build123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/distribution.p12 -k build.keychain -P "" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild || \
          security import /tmp/distribution.p12 -k build.keychain -P "1234" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build123" build.keychain
          security find-identity -v -p codesigning build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Installed profile UUID: $UUID"

      - name: Install Firebase GoogleService-Info.plist (optional)
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_B64" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > ios/$XCODE_SCHEME/GoogleService-Info.plist
            echo "GoogleService-Info.plist installed"
          else
            echo "Skipping Firebase plist (variable not set)"
          fi

      - name: Create ExportOptions
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>5GF5TZZ9RQ</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>zaplynx pay</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
          </dict>
          </plist>
          EOF

      - name: Build iOS app (archive + export IPA)
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="zaplynx pay" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="5GF5TZZ9RQ" \
            -destination "generic/platform=iOS" \
            archive
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
