workflows:
  ios-release:
    name: Zaplynx Pay - iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_NAME: "Zaplynx Pay"
      node: 22.0.0
    scripts:
      - name: Install certificate and profile
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/distribution.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          security create-keychain -p "build123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/distribution.p12 -k build.keychain -P "" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild || \
          security import /tmp/distribution.p12 -k build.keychain -P "1234" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild || \
          openssl pkcs12 -in /tmp/distribution.p12 -nodes -passin pass: -out /tmp/cert.pem 2>/dev/null || \
          openssl pkcs12 -in /tmp/distribution.p12 -nodes -passin pass:1234 -out /tmp/cert.pem -legacy 2>/dev/null
          if [ -f /tmp/cert.pem ]; then
            security import /tmp/cert.pem -k build.keychain -T /usr/bin/codesign || true
          fi
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build123" build.keychain
          security find-identity -v -p codesigning build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Installed profile UUID: $UUID"
      - name: Install dependencies
        script: |
          npm install
      - name: Install Capacitor CLI
        script: |
          npm install -g @capacitor/cli
      - name: Build web app
        script: |
          npm run build
      - name: Add iOS platform (if not exists)
        script: |
          rm -rf ios
          npx cap add ios
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Install Firebase GoogleService-Info.plist
        script: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST_B64" ]; then
            echo "ERROR: GOOGLE_SERVICE_INFO_PLIST_B64 is not set"
            exit 1
          fi
          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > ios/App/App/GoogleService-Info.plist
          if [ ! -s ios/App/App/GoogleService-Info.plist ]; then
            echo "ERROR: GoogleService-Info.plist is empty after decode"
            exit 1
          fi
          echo "GoogleService-Info.plist installed ($(wc -c < ios/App/App/GoogleService-Info.plist) bytes)"
          gem list xcodeproj -i > /dev/null 2>&1 || sudo gem install xcodeproj
          ruby <<'RUBY'
          require 'xcodeproj'
          project_path = 'ios/App/App.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'App' }
          group = project.main_group['App'] || project.main_group
          file_path = 'GoogleService-Info.plist'
          unless group.files.any? { |f| f.path == file_path }
            file_ref = group.new_file(file_path)
            target.add_resources([file_ref])
            puts "Added GoogleService-Info.plist to Xcode project"
          else
            puts "GoogleService-Info.plist already in Xcode project"
          end
          project.save
          RUBY
      - name: Set app name
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName '$APP_NAME'" App/Info.plist
      - name: Install CocoaPods
        script: |
          echo "Skipping CocoaPods - using Swift Package Manager"
      - name: Create ExportOptions
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>5GF5TZZ9RQ</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.zaplynxpay.app</key>
              <string>zaplynx pay</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
          </dict>
          </plist>
          EOF
      - name: Build iOS app
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="zaplynx pay" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="5GF5TZZ9RQ" \
            -destination "generic/platform=iOS" \
            archive
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa
        
        
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
